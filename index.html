<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Cutaway to Presence - xiaoyang 2026</title>
  <style>
    :root {
      color-scheme: light dark;
      --page-shadow: 0 18px 48px rgba(0, 0, 0, .22);
      --bg: #d8d6d0;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 1320px);
      margin: 0 auto;
      padding: clamp(16px, 3vw, 40px) clamp(12px, 2.4vw, 32px);
    }
    .page {
      margin: 0 auto clamp(18px, 3vw, 36px);
      width: min(100%, 1120px);
      line-height: 0;
      box-shadow: var(--page-shadow);
      background: #fff;
    }
    .page img {
      display: block;
      width: 100%;
      height: auto;
    }
    @media print {
      html, body, main { background: #fff; }
      main { width: 100%; padding: 0; }
      .page {
        width: 100%;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
      }
      .page:last-child { page-break-after: auto; }
    }
  </style>
</head>
<body>
  <main aria-label="A Cutaway to Presence PDF pages">
